<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Interaktif: ENG-STS-K5-S2-HOTS</title>
    <style>
        /* CSS Styling */
        :root {
            --primary: #4A90E2;
            --secondary: #F39C12;
            --dark: #2C3E50;
            --light: #ECF0F1;
            --correct: #27AE60;
            --wrong: #E74C3C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            /* Anti Copy-Paste & Selection */
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            flex: 1;
            max-width: 800px;
            margin: 20px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 30px;
            position: relative;
        }

        /* Login Screen */
        #login-screen {
            text-align: center;
        }

        #login-screen h1 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 80%;
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: white;
            margin: 5px;
        }

        .btn-start { background-color: var(--secondary); }
        .btn-start:hover { background-color: #d68910; }
        
        .btn-home { background-color: var(--dark); margin-bottom: 20px;}
        .btn-home:hover { background-color: #1a252f; }

        .btn-nav { background-color: var(--primary); }
        .btn-nav:hover { background-color: #357abd; }

        /* History Table */
        .history-container {
            margin-top: 30px;
            border-top: 2px solid var(--light);
            padding-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table, th, td {
            border: 1px solid #bdc3c7;
        }

        th, td {
            padding: 10px;
            text-align: left;
        }

        th { background-color: var(--primary); color: white; }

        /* Quiz Screen */
        #quiz-screen, #result-screen { display: none; }

        .score-board {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark);
            margin-bottom: 20px;
            text-align: right;
        }

        .question-text {
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none; /* Shown via JS if exists */
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #bdc3c7;
            background: white;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--light);
            border-color: var(--primary);
        }

        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: var(--correct) !important; color: white; border-color: var(--correct); }
        .wrong { background-color: var(--wrong) !important; color: white; border-color: var(--wrong); }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 5px solid var(--correct);
            display: none;
            font-size: 1rem;
            line-height: 1.4;
        }

        .navigation-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }

        /* Footer */
        .footer {
            background-color: #1a1a1a;
            color: #bdc3c7;
            text-align: center;
            padding: 15px;
            margin-top: auto;
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        Kode Soal: ENG-STS-K5-S2-HOTS
    </div>

    <div class="container">
        <div id="login-screen">
            <h1>Welcome to Smart English Quiz</h1>
            <div class="input-group">
                <input type="text" id="student-name" placeholder="Nama Lengkap" required>
            </div>
            <div class="input-group">
                <input type="text" id="student-class" placeholder="Kelas" required>
            </div>
            <button class="btn btn-start" onclick="startQuiz()">Mulai Kuis</button>
            <br><br>
            <button class="btn btn-home" onclick="window.location.href='../index.html'">Kembali ke Home</button>
            
            <div class="history-container">
                <h3>Riwayat Skor</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Kelas</th>
                            <th>Skor</th>
                            <th>Waktu</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="quiz-screen">
            <div class="score-board">Skor Sementara: <span id="current-score">0</span></div>
            <div id="question-number" style="font-weight: bold; color: var(--secondary); margin-bottom: 10px;"></div>
            
            <img id="q-image" class="question-image" src="" alt="">
            <div class="question-text" id="q-text"></div>
            
            <div class="options-container" id="options-box">
                </div>

            <div class="explanation" id="explanation-box"></div>

            <div class="navigation-buttons">
                <button class="btn btn-nav" id="btn-prev" onclick="prevQuestion()" style="display:none;">Sebelumnya</button>
                <button class="btn btn-nav" id="btn-next" onclick="nextQuestion()" disabled>Selanjutnya</button>
            </div>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h1 style="color: var(--primary);">Kuis Selesai!</h1>
            <h2>Nama: <span id="res-name"></span></h2>
            <h2>Kelas: <span id="res-class"></span></h2>
            <h1 style="font-size: 4rem; color: var(--correct);" id="final-score"></h1>
            <button class="btn btn-start" onclick="location.reload()">Selesai & Simpan</button>
        </div>
    </div>

    <div class="footer">
        &copy; <span id="year"></span> Oleh: Dwi Endrasto<br>
        Produk ini asli jika didapatkan/dibeli melalui <a href="https://lynk.id/smartbanksoal" target="_blank">https://lynk.id/smartbanksoal</a>
    </div>

    <script>
        // --- SECURITY FEATURES ---
        // Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());
        // Disable Copy Paste Shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'u' || e.key === 's')) {
                e.preventDefault();
            }
        });

        // --- FOOTER YEAR ---
        document.getElementById('year').textContent = new Date().getFullYear();

        // --- DATABASE & STATE ---
        const STORAGE_KEY = 'SmartBankSoal_ENG_STS_K5_S2_HOTS_2026';
        let currentUser = { name: '', class: '' };
        let currentQuestionIndex = 0;
        let score = 0;
        let quizQuestions = [];
        let userAnswers = []; // To track answered state

        // --- QUESTION BANK (25 HOTS Questions) ---
        // Options word count is kept consistent per question
        const rawQuestions = [
            // --- Part of our body that work together (8 Questions) ---
            {
                text: "Andi is eating a very spicy noodle. His face turns red and he drinks a lot of water. Which body part sends the spicy signal to his brain?",
                options: ["His eyes", "His ears", "His nose", "His tongue"], // 2 words
                answer: "His tongue",
                explanation: "The tongue has taste buds that detect flavors, including spicy food, and sends signals to the brain."
            },
            {
                text: "When you play football, you need to run fast and kick the ball to the goal. Which body parts work together the most to do this?",
                options: ["Legs feet", "Arms hands", "Eyes ears", "Nose hair"], // 2 words
                answer: "Legs feet",
                explanation: "Running and kicking primarily require the muscles and bones in our legs and feet to work together."
            },
            { // IMAGE QUESTION 1
                text: "Look at the picture. This organ pumps blood to all parts of our body so we can stay alive. What happens if this organ stops working?",
                image: "gambar/heart.jpg",
                imageAlt: "Gambar ilustrasi jantung manusia",
                options: ["Body dies", "Body grows", "Body sleeps", "Body runs"], // 2 words
                answer: "Body dies",
                explanation: "The heart pumps blood. If it stops, the body doesn't get oxygen and dies."
            },
            {
                text: "Siti accidentally touched a hot kettle in the kitchen. She quickly pulled her hand away. Why did she do that?",
                options: ["Skin felt hot", "Eyes saw fire", "Ears heard sound", "Nose smelled smoke"], // 3 words
                answer: "Skin felt hot",
                explanation: "Our skin is sensitive to temperature. It feels the heat and makes us react quickly to avoid burns."
            },
            {
                text: "Budi is reading a book in a dark room. He cannot read the letters properly. Which body part needs light to function well?",
                options: ["Eyes", "Ears", "Nose", "Skin"], // 1 word
                answer: "Eyes",
                explanation: "Our eyes require light to see objects and read text clearly."
            },
            { // IMAGE QUESTION 2
                text: "Look at the picture. The food we swallow goes down into this part to be broken down. What is the name of this organ?",
                image: "gambar/stomach.jpg",
                imageAlt: "Gambar ilustrasi lambung pada sistem pencernaan",
                options: ["Stomach", "Lungs", "Brain", "Liver"], // 1 word
                answer: "Stomach",
                explanation: "The stomach digests the food we swallow by breaking it down with acids."
            },
            {
                text: "When we breathe in fresh air in the morning, our chest expands. Which organ is responsible for taking in the oxygen?",
                options: ["The lungs", "The bones", "The blood", "The teeth"], // 2 words
                answer: "The lungs",
                explanation: "The lungs are responsible for breathing in oxygen and breathing out carbon dioxide."
            },
            {
                text: "You can hold a pencil and write beautifully on your notebook. Which parts of your body allow you to grip the pencil?",
                options: ["Fingers", "Toes", "Knees", "Elbows"], // 1 word
                answer: "Fingers",
                explanation: "Fingers have joints and muscles that allow us to grip objects like a pencil firmly."
            },

            // --- How tall are you (7 Questions) ---
            {
                text: "My grandfather walks slowly. His hair is white and he uses a cane. Which adjective best describes my grandfather's physical condition?",
                options: ["Old", "Young", "Fast", "Strong"], // 1 word
                answer: "Old",
                explanation: "Walking slowly, having white hair, and using a cane are characteristics of someone who is old."
            },
            {
                text: "An elephant cannot hide behind a small tree because its body takes up a lot of space. How do we describe the elephant?",
                options: ["Very big", "Very small", "Very thin", "Very light"], // 2 words
                answer: "Very big",
                explanation: "An elephant takes up a lot of space because it is very big."
            },
            { // IMAGE QUESTION 3
                text: "Look at the picture of this animal. It has a very long neck to reach leaves on tall trees. What animal is this?",
                image: "gambar/giraffe.jpg",
                imageAlt: "Gambar jerapah memakan daun di pohon",
                options: ["Giraffe", "Monkey", "Rabbit", "Turtle"], // 1 word
                answer: "Giraffe",
                explanation: "A giraffe is famous for its long neck and legs."
            },
            {
                text: "Rina always helps her mother sweep the floor and wash the dishes every afternoon. What kind of girl is Rina?",
                options: ["Diligent girl", "Lazy girl", "Angry girl", "Sad girl"], // 2 words
                answer: "Diligent girl",
                explanation: "Someone who frequently helps with chores is described as diligent."
            },
            {
                text: "The ruler is 30 centimeters long. The pencil is 15 centimeters long. Which statement is correct about the ruler?",
                options: ["It is long", "It is short", "It is thick", "It is soft"], // 3 words
                answer: "It is long",
                explanation: "Compared to the 15cm pencil, the 30cm ruler is considered long."
            },
            {
                text: "Budi exercises every day. He can lift heavy boxes easily. How do we describe Budi's body?",
                options: ["Strong", "Weak", "Sick", "Tired"], // 1 word
                answer: "Strong",
                explanation: "Being able to lift heavy things easily means the person is strong."
            },
            {
                text: "A cheetah can catch its prey in a few seconds. It runs extremely fast. What is the opposite of the cheetah's speed?",
                options: ["Slow", "Quick", "Smart", "Brave"], // 1 word
                answer: "Slow",
                explanation: "The cheetah is fast. The opposite of fast is slow."
            },

            // --- The giraffe is taller than deer (Comparative) (10 Questions) ---
            {
                text: "A car has four wheels and a bicycle has two wheels. A car can carry five people, but a bicycle only carries two. Which statement is true?",
                options: ["Car is bigger", "Bike is bigger", "Car is smaller", "Bike is heavier"], // 3 words
                answer: "Car is bigger",
                explanation: "A car holds more people and has more wheels, so it is bigger than a bicycle."
            },
            {
                text: "Mount Rinjani is 3,726 meters high. Mount Bromo is 2,329 meters high. What can we conclude about Mount Rinjani?",
                options: ["Higher than Bromo", "Lower than Bromo", "Smaller than Bromo", "Colder than Bromo"], // 3 words
                answer: "Higher than Bromo",
                explanation: "3,726 meters is a larger number than 2,329 meters, making Rinjani higher."
            },
            { // IMAGE QUESTION 4
                text: "Look at the picture. Animal A is a lion. Animal B is a house cat. Compare their sizes.",
                image: "gambar/lion_cat.jpg",
                imageAlt: "Gambar perbandingan singa dan kucing",
                options: ["Lion is larger", "Cat is larger", "Lion is smaller", "Cat is heavier"], // 3 words
                answer: "Lion is larger",
                explanation: "A wild lion is significantly larger and heavier than a domestic house cat."
            },
            {
                text: "In the math test, Andi got 90 and Budi got 75. Therefore, Andi's score is ... than Budi's score.",
                options: ["Better", "Worse", "Lower", "Badder"], // 1 word
                answer: "Better",
                explanation: "90 is a higher score than 75, so Andi's score is better."
            },
            {
                text: "An airplane takes 2 hours to go to Bali. A bus takes 24 hours to go to Bali. The airplane is ... than the bus.",
                options: ["Faster", "Slower", "Longer", "Cheaper"], // 1 word
                answer: "Faster",
                explanation: "2 hours is less time than 24 hours, meaning the airplane travels faster."
            },
            { // IMAGE QUESTION 5
                text: "Look at the picture of the two trees. Tree A reaches the roof of the house. Tree B only reaches the window. Which sentence is correct?",
                image: "gambar/trees.jpg",
                imageAlt: "Gambar pohon A yang tinggi dan pohon B yang pendek",
                options: ["Tree A taller", "Tree B taller", "Tree A shorter", "Tree B bigger"], // 3 words
                answer: "Tree A taller",
                explanation: "Since Tree A reaches higher (the roof) than Tree B (the window), Tree A is taller."
            },
            {
                text: "A dictionary usually has 1000 pages. A comic book usually has 50 pages. We can say that the dictionary is ... than the comic book.",
                options: ["Thicker", "Thinner", "Lighter", "Smaller"], // 1 word
                answer: "Thicker",
                explanation: "More pages make a book thicker. Therefore, the dictionary is thicker."
            },
            {
                text: "Watermelon is heavy and difficult to carry with one hand. An apple is light and easy to carry. The watermelon is ... than the apple.",
                options: ["Heavier", "Lighter", "Smaller", "Sweeter"], // 1 word
                answer: "Heavier",
                explanation: "Because it is difficult to carry and weighs more, the watermelon is heavier."
            },
            {
                text: "The weather in Jakarta is 35 degrees Celsius. The weather in Bandung is 22 degrees Celsius. Jakarta is ... than Bandung.",
                options: ["Hotter", "Colder", "Cooler", "Wetter"], // 1 word
                answer: "Hotter",
                explanation: "35 degrees is a higher temperature than 22 degrees, making it hotter."
            },
            {
                text: "A tortoise walks 1 meter in a minute. A rabbit runs 50 meters in a minute. The tortoise is ... than the rabbit.",
                options: ["Slower", "Faster", "Quicker", "Bigger"], // 1 word
                answer: "Slower",
                explanation: "Covering less distance in the same amount of time means the tortoise is slower."
            }
        ];

        // --- UTILITY FUNCTIONS ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            history.forEach(entry => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${entry.name}</td><td>${entry.class}</td><td>${entry.score}</td><td>${entry.date}</td>`;
                tbody.appendChild(tr);
            });
        }

        function saveHistory(scoreValue) {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const date = new Date().toLocaleString('id-ID');
            history.push({ name: currentUser.name, class: currentUser.class, score: scoreValue, date: date });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        // --- QUIZ LOGIC ---
        function startQuiz() {
            const name = document.getElementById('student-name').value.trim();
            const cls = document.getElementById('student-class').value.trim();

            if (!name || !cls) {
                alert('Silakan isi Nama Lengkap dan Kelas terlebih dahulu!');
                return;
            }

            currentUser = { name, class: cls };
            
            // Prepare Questions
            quizQuestions = shuffleArray(rawQuestions); // Acak soal
            userAnswers = new Array(quizQuestions.length).fill(null);
            currentQuestionIndex = 0;
            score = 0;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            renderQuestion();
        }

        function renderQuestion() {
            const q = quizQuestions[currentQuestionIndex];
            document.getElementById('question-number').innerText = `Soal ${currentQuestionIndex + 1} dari ${quizQuestions.length}`;
            document.getElementById('current-score').innerText = score;
            
            // Image handling
            const imgEl = document.getElementById('q-image');
            if (q.image) {
                imgEl.src = q.image;
                imgEl.alt = q.imageAlt;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }

            document.getElementById('q-text').innerText = q.text;
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('btn-next').disabled = true;

            // Nav buttons visibility
            document.getElementById('btn-prev').style.display = currentQuestionIndex > 0 ? 'inline-block' : 'none';
            document.getElementById('btn-next').innerText = currentQuestionIndex === quizQuestions.length - 1 ? 'Selesai' : 'Selanjutnya';

            // Render Options
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            
            // Acak pilihan jawaban
            let shuffledOptions = shuffleArray(q.options);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                
                // If already answered when going back
                if (userAnswers[currentQuestionIndex]) {
                    btn.disabled = true;
                    if (opt === q.answer) btn.classList.add('correct');
                    else if (opt === userAnswers[currentQuestionIndex].selected && opt !== q.answer) btn.classList.add('wrong');
                    
                    document.getElementById('explanation-box').innerText = "Pembahasan: " + q.explanation;
                    document.getElementById('explanation-box').style.display = 'block';
                    document.getElementById('btn-next').disabled = false;
                } else {
                    btn.onclick = () => selectAnswer(btn, opt, q.answer, q.explanation);
                }
                
                optionsBox.appendChild(btn);
            });
        }

        function selectAnswer(btnElement, selectedOpt, correctOpt, explanation) {
            // Disable all options
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (selectedOpt === correctOpt) {
                btnElement.classList.add('correct');
                score += 4; // 25 soal x 4 = 100
            } else {
                btnElement.classList.add('wrong');
                // Highlight correct answer
                buttons.forEach(b => {
                    if (b.innerText === correctOpt) b.classList.add('correct');
                });
            }

            document.getElementById('current-score').innerText = score;
            document.getElementById('explanation-box').innerText = "Pembahasan: " + explanation;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('btn-next').disabled = false;

            // Save state
            userAnswers[currentQuestionIndex] = { selected: selectedOpt };
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            saveHistory(score);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('res-name').innerText = currentUser.name;
            document.getElementById('res-class').innerText = currentUser.class;
            document.getElementById('final-score').innerText = score;
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
