                    "ditulis dengan banyak kalimat kiasan indah", 
                    "ditempel pada tembok yang sangat tinggi"  
                ],
                ans: 0,
                pembahasan: "Pengumuman harus efektif. Bahasa yang digunakan harus jelas, singkat, dan padat agar informasi tidak membingungkan."
            }
        ];

        // --- SISTEM PENYIMPANAN LOKAL ---
        const storageKey = 'history_IND_STS_K5_S2_HOTS';
        
        // --- VARIABEL STATE ---
        let currentQuestions = [];
        let currentIndex = 0;
        let userData = { nama: '', kelas: '' };
        
        // --- KEAMANAN 1: Array Flagging Khusus ---
        // Array ini merekam jawaban agar soal tidak bisa dijawab berulang meski di back
        let userAnswers = []; 

        window.onload = () => {
            renderHistory();
        };

        // --- FUNGSI INTEGRASI REKAP ---
        function simpanHasilKuis(namaSiswa, kelasSiswa, namaMapel, skorAkhir) {
            let riwayatKuis = JSON.parse(localStorage.getItem('dataKuis')) || [];
            let waktuSekarang = new Date().toLocaleString('id-ID'); 
            let dataBaru = {
                nama: namaSiswa,
                kelas: kelasSiswa,
                mapel: namaMapel,
                nilai: skorAkhir,
                waktu: waktuSekarang
            };
            riwayatKuis.push(dataBaru);
            localStorage.setItem('dataKuis', JSON.stringify(riwayatKuis));
        }

        function startQuiz() {
            const namaInput = document.getElementById('nama').value.trim();
            const kelasInput = document.getElementById('kelas').value.trim();
            
            if (!namaInput || !kelasInput) {
                alert('Mohon isi Nama Lengkap dan Kelas terlebih dahulu.');
                return;
            }
            
            userData.nama = namaInput;
            userData.kelas = kelasInput;
            
            // --- KEAMANAN 2: Reset Menyeluruh Variabel ---
            currentIndex = 0;
            userAnswers = new Array(bankSoal.length).fill(null);
            
            currentQuestions = [...bankSoal].sort(() => Math.random() - 0.5);
            
            currentQuestions.forEach(q => {
                const optionsWithIndex = q.options.map((opt, i) => ({ text: opt, originalIndex: i }));
                optionsWithIndex.sort(() => Math.random() - 0.5);
                q.shuffledOptions = optionsWithIndex;
            });

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            
            // Tampilkan Skor 0 diawal
            document.getElementById('scoreText').textContent = `Skor Sementara: 0`;
            
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentQuestions[currentIndex];
            
            document.getElementById('progressText').textContent = `Soal: ${currentIndex + 1} / ${currentQuestions.length}`;
            
            document.getElementById('questionArea').innerHTML = `<div class="question-text">${currentIndex + 1}. ${q.q}</div>`;
            
            const imgArea = document.getElementById('imgArea');
            if (q.img) {
                document.getElementById('qImage').src = q.img;
                document.getElementById('qImageDesc').textContent = q.imgDesc;
                imgArea.classList.remove('hidden');
            } else {
                imgArea.classList.add('hidden');
            }
            
            const optionsArea = document.getElementById('optionsArea');
            optionsArea.innerHTML = '';
            
            // Cek apakah soal ini sudah pernah dijawab sebelumnya
            const isAnswered = userAnswers[currentIndex] !== null;
            
            q.shuffledOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                const letter = String.fromCharCode(65 + idx); 
                btn.innerHTML = `<strong>${letter}.</strong> ${opt.text}`;
                
                // Jika sudah dijawab, matikan tombol dan tampilkan mana yang diklik
                if (isAnswered) {
                    btn.disabled = true;
                    if (opt.originalIndex === q.ans) {
                        btn.classList.add('correct');
                    } else if (opt.originalIndex === userAnswers[currentIndex] && opt.originalIndex !== q.ans) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => checkAnswer(opt.originalIndex, idx, btn);
                }
                
                optionsArea.appendChild(btn);
            });
            
            const pembahasanArea = document.getElementById('pembahasanArea');
            if (isAnswered) {
                pembahasanArea.innerHTML = `<strong>Pembahasan:</strong><br>${q.pembahasan}`;
                pembahasanArea.style.display = 'block';
            } else {
                pembahasanArea.style.display = 'none';
            }
            
            if (currentIndex > 0) {
                document.getElementById('btnPrev').classList.remove('hidden');
            } else {
                document.getElementById('btnPrev').classList.add('hidden');
            }
            
            if (currentIndex === currentQuestions.length - 1) {
                document.getElementById('btnNext').classList.add('hidden');
                document.getElementById('btnFinish').classList.remove('hidden');
            } else {
                document.getElementById('btnNext').classList.remove('hidden');
                document.getElementById('btnFinish').classList.add('hidden');
            }
        }

        function checkAnswer(selectedOriginalIndex, btnIndex, btnElement) {
            // Mencegah klik dua kali / dobel jawaban
            if (userAnswers[currentIndex] !== null) return; 
            
            // Kunci jawaban ke dalam array
            userAnswers[currentIndex] = selectedOriginalIndex;
            
            const q = currentQuestions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach(b => b.disabled = true);
            
            if (selectedOriginalIndex === q.ans) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('wrong');
                const correctBtnIndex = q.shuffledOptions.findIndex(o => o.originalIndex === q.ans);
                buttons[correctBtnIndex].classList.add('correct');
            }
            
            // --- KEAMANAN 3: Hitung Skor Sementara Berbasis Persentase ---
            let tempJawabanBenar = 0;
            userAnswers.forEach((ans, i) => {
                if(ans !== null && ans === currentQuestions[i].ans) {
                    tempJawabanBenar++;
                }
            });
            let tempScore = Math.min(Math.round((tempJawabanBenar / currentQuestions.length) * 100), 100);
            document.getElementById('scoreText').textContent = `Skor Sementara: ${tempScore}`;
            
            const pembahasanArea = document.getElementById('pembahasanArea');
            pembahasanArea.innerHTML = `<strong>Pembahasan:</strong><br>${q.pembahasan}`;
            pembahasanArea.style.display = 'block';
        }

        function goNext() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                loadQuestion();
            }
        }

        function goPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                loadQuestion();
            }
        }

        function finishQuiz() {
            // --- KEAMANAN 4: Perhitungan Final Berbasis Persentase (Double-check) & Limiter ---
            let jumlahJawabanBenar = 0;
            userAnswers.forEach((ans, index) => {
                if (ans !== null && ans === currentQuestions[index].ans) {
                    jumlahJawabanBenar++;
                }
            });
            
            let persentaseSkor = Math.round((jumlahJawabanBenar / currentQuestions.length) * 100);
            let finalScore = Math.min(persentaseSkor, 100); // Batas nilai absolut 100

            const date = new Date();
            const timeStr = `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()} ${date.getHours()}:${date.getMinutes()}`;
            
            // PUSH KE HALAMAN REKAP GLOBAL
            simpanHasilKuis(userData.nama, userData.kelas, "B. Indonesia IND-STS-K5", finalScore);

            const record = {
                nama: userData.nama,
                kelas: userData.kelas,
                skor: finalScore,
                waktu: timeStr
            };
            
            let history = JSON.parse(localStorage.getItem(storageKey)) || [];
            history.push(record);
            localStorage.setItem(storageKey, JSON.stringify(history));
            
            alert(`Ujian Selesai!\nNama: ${userData.nama}\nSkor Anda: ${finalScore}`);
            
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            
            document.getElementById('nama').value = '';
            document.getElementById('kelas').value = '';
            
            renderHistory();
        }

        function renderHistory() {
            const historyBody = document.getElementById('historyBody');
            historyBody.innerHTML = '';
            
            let history = JSON.parse(localStorage.getItem(storageKey)) || [];
            if (history.length === 0) {
                historyBody.innerHTML = `<tr><td colspan="4">Belum ada data riwayat.</td></tr>`;
                return;
            }
            
            history.reverse().forEach(row => {
                historyBody.innerHTML += `
                    <tr>
                        <td>${row.nama}</td>
                        <td>${row.kelas}</td>
                        <td><strong>${row.skor}</strong></td>
                        <td>${row.waktu}</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
