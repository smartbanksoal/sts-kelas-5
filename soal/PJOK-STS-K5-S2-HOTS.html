            userClass = document.getElementById('userClass').value;

            if (!userName || !userClass) {
                alert("Mohon isi Nama dan Kelas!");
                return;
            }

            // Acak soal 
            shuffledQuestions = questions.sort(() => Math.random() - 0.5).slice(0, 25);
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = shuffledQuestions[currentQuestionIndex];
            const container = document.getElementById('options-container');
            const imgBox = document.getElementById('image-box');
            
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${q.text}`;
            imgBox.innerHTML = q.image ? `<img src="${q.image}" alt="${q.imgDesc}"><p><small>${q.imgDesc}</small></p>` : '';
            container.innerHTML = '';
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            // Acak pilihan jawaban 
            let options = q.options.map((opt, index) => ({ text: opt, index }));
            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.innerText = opt.text;
                btn.className = 'option-btn';
                btn.onclick = () => checkAnswer(btn, opt.index, q.correct, q.explanation);
                container.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct, expl) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (selected === correct) {
                btn.classList.add('correct');
                score += 4; // 25 soal x 4 = 100
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
            }

            document.getElementById('score-display').innerText = `Skor: ${score}`;
            const explBox = document.getElementById('explanation-box');
            explBox.innerHTML = `<strong>Pembahasan:</strong><br>${expl}`;
            explBox.style.display = 'block';
            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < shuffledQuestions.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            const now = new Date();
            const timeStr = `${now.toLocaleDateString()} ${now.getHours()}:${now.getMinutes()}`;
            
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            history.push({ name: userName, class: userClass, score: score, time: timeStr });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));

            alert(`Kuis Selesai! Skor Akhir Anda: ${score}`);
            location.reload(); // Kembali ke login
        }

    </script>
</body>
</html>
